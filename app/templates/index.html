{% extends "base.html" %}
{% block title %}QMS - 首页{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <h1 class="display-4"><i class="bi bi-file-text text-primary"></i></h1>
        <h2 class="mb-4">质量体系文件管理系统</h2>
        <p class="lead text-muted mb-4">
            适用于医院、第三方检验实验室的质量体系文件全生命周期管理
        </p>
        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
            <a href="/login" class="btn btn-primary btn-lg px-4">
                <i class="bi bi-box-arrow-in-right"></i> 登录系统
            </a>
        </div>
        <hr class="my-5">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card h-100 border-0 bg-light">
                    <div class="card-body">
                        <i class="bi bi-file-earmark-plus fs-1 text-primary"></i>
                        <h5>文件起草</h5>
                        <small class="text-muted">支持多格式文件上传，版本追溯</small>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100 border-0 bg-light">
                    <div class="card-body">
                        <i class="bi bi-check2-circle fs-1 text-success"></i>
                        <h5>审批流程</h5>
                        <small class="text-muted">起草→审核→批准→发布，闭环管理</small>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100 border-0 bg-light">
                    <div class="card-body">
                        <i class="bi bi-search fs-1 text-info"></i>
                        <h5>审计追踪</h5>
                        <small class="text-muted">全操作日志，符合 ISO 15189 要求</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
