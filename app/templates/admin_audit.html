{% extends "base.html" %}
{% block title %}审计日志{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0"><i class="bi bi-journal-text"></i> 审计日志</h4>
</div>

<div class="table-responsive">
    <table class="table table-sm table-hover">
        <thead class="table-light">
            <tr>
                <th>时间</th><th>用户</th><th>操作</th><th>对象类型</th><th>详情</th>
            </tr>
        </thead>
        <tbody id="auditTableBody">
            <tr><td colspan="5" class="text-center text-muted py-4">加载中...</td></tr>
        </tbody>
    </table>
</div>

<nav>
    <ul class="pagination justify-content-center" id="auditPagination"></ul>
</nav>
{% endblock %}

{% block extra_scripts %}
<script>
const actionLabels = {
    login:'登录', create_document:'创建文件', update_document:'更新文件', delete_document:'删除文件',
    submit_document:'提交审核', approve_document:'批准', reject_document:'驳回',
    publish_document:'发布', archive_document:'归档',
};
const typeLabels = {document:'文件', user:'用户', department:'科室', category:'分类'};
let currentPage = 1;

async function loadAudit(page = 1) {
    currentPage = page;
    const res = await fetch(`/api/audit?page=${page}&page_size=50`, {
        headers: {Authorization: 'Bearer ' + localStorage.getItem('token')}
    });
    if (!res.ok) return;
    const data = await res.json();

    document.getElementById('auditTableBody').innerHTML = data.items.length === 0
        ? '<tr><td colspan="5" class="text-center text-muted py-4">暂无日志</td></tr>'
        : data.items.map(log => `
            <tr>
                <td><small class="text-muted">${new Date(log.created_at).toLocaleString('zh-CN')}</small></td>
                <td>${log.user || '-'}</td>
                <td><span class="badge bg-secondary">${actionLabels[log.action] || log.action}</span></td>
                <td>${typeLabels[log.target_type] || log.target_type}</td>
                <td><small class="text-muted">${log.details || '-'}</small></td>
            </tr>
        `).join('');

    const totalPages = Math.ceil(data.total / data.page_size);
    document.getElementById('auditPagination').innerHTML = Array.from({length: totalPages}, (_, i) =>
        `<li class="page-item ${i+1 === page ? 'active' : ''}">
            <a class="page-link" href="#" onclick="loadAudit(${i+1})">${i+1}</a>
        </li>`
    ).join('');
}

document.addEventListener('DOMContentLoaded', () => loadAudit(1));
</script>
{% endblock %}
