{% extends "base.html" %}
{% block title %}用户管理{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0"><i class="bi bi-people"></i> 用户管理</h4>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#userModal">
        <i class="bi bi-plus-lg"></i> 新建用户
    </button>
</div>

<div class="table-responsive">
    <table class="table table-hover">
        <thead class="table-light">
            <tr>
                <th>用户名</th><th>姓名</th><th>邮箱</th><th>角色</th><th>科室</th><th>状态</th><th>创建时间</th><th>操作</th>
            </tr>
        </thead>
        <tbody id="userTableBody">
            <tr><td colspan="8" class="text-center text-muted py-4">加载中...</td></tr>
        </tbody>
    </table>
</div>

<!-- 新建/编辑用户 Modal -->
<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><span id="userModalTitle">新建用户</span></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="userForm">
                    <input type="hidden" id="editUserId">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-control" id="u_username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码（新建时必填）</label>
                        <input type="password" class="form-control" id="u_password">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">姓名</label>
                        <input type="text" class="form-control" id="u_full_name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">邮箱</label>
                        <input type="email" class="form-control" id="u_email">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">角色</label>
                        <select class="form-select" id="u_role">
                            <option value="user">普通用户</option>
                            <option value="reviewer">审核员</option>
                            <option value="admin">管理员</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">科室</label>
                        <select class="form-select" id="u_department_id">
                            <option value="">无</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveUser()">保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
async function loadUsers() {
    const res = await fetch('/api/auth/users', {
        headers: {Authorization: 'Bearer ' + localStorage.getItem('token')}
    });
    const users = await res.json();
    const roleLabels = {admin:'管理员', reviewer:'审核员', user:'普通用户'};
    document.getElementById('userTableBody').innerHTML = users.map(u => `
        <tr>
            <td><code>${u.username}</code></td>
            <td>${u.full_name}</td>
            <td>${u.email || '-'}</td>
            <td><span class="badge bg-${u.role === 'admin' ? 'danger' : u.role === 'reviewer' ? 'warning' : 'secondary'}">${roleLabels[u.role]}</span></td>
            <td>${u.department || '-'}</td>
            <td>${u.is_active ? '<span class="badge bg-success">正常</span>' : '<span class="badge bg-danger">禁用</span>'}</td>
            <td><small class="text-muted">${new Date(u.created_at).toLocaleDateString('zh-CN')}</small></td>
            <td>
                <button class="btn btn-sm btn-outline-primary" onclick="editUser('${u.id}')"><i class="bi bi-pencil"></i></button>
            </td>
        </tr>
    `).join('');
}

async function loadDeptOptions(selectId, selectedId) {
    const res = await fetch('/api/departments', {
        headers: {Authorization: 'Bearer ' + localStorage.getItem('token')}
    });
    if (!res.ok) return;
    const depts = await res.json();
    document.getElementById(selectId).innerHTML = '<option value="">无</option>' +
        depts.map(d => `<option value="${d.id}" ${d.id === selectedId ? 'selected' : ''}>${d.name}</option>`).join('');
}

function editUser(id) {
    document.getElementById('userModalTitle').textContent = '编辑用户';
    document.getElementById('editUserId').value = id;
    document.getElementById('u_password').required = false;
    document.getElementById('u_password').placeholder = '留空则不修改';
    loadDeptOptions('u_department_id');
    new bootstrap.Modal(document.getElementById('userModal')).show();
}

async function saveUser() {
    const id = document.getElementById('editUserId').value;
    const isEdit = !!id;
    const body = isEdit ? {
        full_name: document.getElementById('u_full_name').value,
        email: document.getElementById('u_email').value,
        role: document.getElementById('u_role').value,
        department_id: document.getElementById('u_department_id').value || null,
    } : {
        username: document.getElementById('u_username').value,
        password: document.getElementById('u_password').value,
        full_name: document.getElementById('u_full_name').value,
        email: document.getElementById('u_email').value,
        role: document.getElementById('u_role').value,
        department_id: document.getElementById('u_department_id').value || null,
    };

    const res = await fetch(isEdit ? `/api/auth/users/${id}` : '/api/auth/users', {
        method: isEdit ? 'PUT' : 'POST',
        headers: {'Content-Type': 'application/json', Authorization: 'Bearer ' + localStorage.getItem('token')},
        body: JSON.stringify(body),
    });
    const data = await res.json();
    if (res.ok) {
        bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
        loadUsers();
    } else {
        alert(data.detail || '操作失败');
    }
}

// 重置 modal 状态
document.getElementById('userModal').addEventListener('show.bs.modal', function() {
    if (!document.getElementById('editUserId').value) {
        document.getElementById('userModalTitle').textContent = '新建用户';
        document.getElementById('u_password').required = true;
        document.getElementById('u_password').placeholder = '请输入密码';
        document.getElementById('userForm').reset();
        loadDeptOptions('u_department_id');
    }
});
document.getElementById('userModal').addEventListener('hidden.bs.modal', function() {
    document.getElementById('editUserId').value = '';
    document.getElementById('userForm').reset();
});

document.addEventListener('DOMContentLoaded', loadUsers);
</script>
{% endblock %}
