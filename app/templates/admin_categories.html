{% extends "base.html" %}
{% block title %}文件分类管理{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0"><i class="bi bi-tags"></i> 文件分类</h4>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#catModal">
        <i class="bi bi-plus-lg"></i> 新建分类
    </button>
</div>

<div class="table-responsive">
    <table class="table table-hover">
        <thead class="table-light">
            <tr><th>编号</th><th>名称</th><th>描述</th><th>排序</th><th>操作</th></tr>
        </thead>
        <tbody id="catTableBody">
            <tr><td colspan="5" class="text-center text-muted py-4">加载中...</td></tr>
        </tbody>
    </table>
</div>

<div class="modal fade" id="catModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">新建分类</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="catForm">
                    <div class="mb-3">
                        <label class="form-label">分类编号 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="c_code" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">分类名称 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="c_name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">描述</label>
                        <textarea class="form-control" id="c_description" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">排序</label>
                        <input type="number" class="form-control" id="c_sort" value="0">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveCat()">保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
const API = '/api/categories';

async function loadCats() {
    const res = await fetch(API, {headers: {Authorization: 'Bearer ' + localStorage.getItem('token')}});
    if (!res.ok) return;
    const cats = await res.json();
    document.getElementById('catTableBody').innerHTML = cats.map(c => `
        <tr>
            <td><code>${c.code}</code></td>
            <td>${c.name}</td>
            <td>${c.description || '-'}</td>
            <td>${c.sort_order}</td>
            <td>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteCat('${c.id}')"><i class="bi bi-trash"></i></button>
            </td>
        </tr>
    `).join('');
}

async function saveCat() {
    const body = {
        code: document.getElementById('c_code').value,
        name: document.getElementById('c_name').value,
        description: document.getElementById('c_description').value,
        sort_order: parseInt(document.getElementById('c_sort').value) || 0,
    };
    const res = await fetch(API, {
        method: 'POST',
        headers: {'Content-Type': 'application/json', Authorization: 'Bearer ' + localStorage.getItem('token')},
        body: JSON.stringify(body),
    });
    const data = await res.json();
    if (res.ok) {
        bootstrap.Modal.getInstance(document.getElementById('catModal')).hide();
        document.getElementById('catForm').reset();
        loadCats();
    } else {
        alert(data.detail);
    }
}

async function deleteCat(id) {
    if (!confirm('确定删除该分类？')) return;
    const res = await fetch(`${API}/${id}`, {
        method: 'DELETE',
        headers: {Authorization: 'Bearer ' + localStorage.getItem('token')},
    });
    if (res.ok) loadCats();
    else alert((await res.json()).detail);
}

document.addEventListener('DOMContentLoaded', loadCats);
</script>
{% endblock %}
